<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Gateway — Scan QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff3e00;
      --primary-rgb: 255, 62, 0;
      --secondary: #00f2ff;
      --bg: #000000;
      --surface: #0a0a0a;
      --card: #111111;
      --text: #ffffff;
      --text-muted: #888888;
      --border: #1a1a1a;
      --danger: #ff0000;
      --success: #00ff88;
      --brutal-border: 4px solid var(--border);
      --shadow-hard: 12px 12px 0px var(--border);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(var(--primary-rgb), 0.08) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: -20px;
    }

    .card {
      background: var(--card);
      border: var(--brutal-border);
      box-shadow: var(--shadow-hard);
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 440px;
      width: 90%;
    }

    .qr-container {
      background: #000;
      border: 2px solid var(--border);
      padding: 16px;
    }

    .qr-container img {
      display: block;
      width: 280px;
      height: 280px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 18px;
      background: #0a0a0a;
      border: 2px solid var(--border);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 0;
      background: #f59e0b;
      animation: pulse 1.5s infinite;
    }

    .dot.connected { background: var(--success); animation: none; box-shadow: 0 0 16px var(--success); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .phone {
      font-family: 'Space Grotesk', monospace;
      color: var(--primary);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .instructions {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      line-height: 1.8;
      padding: 16px;
      background: #0a0a0a;
      border: 2px solid var(--border);
      font-weight: 600;
    }

    .instructions strong {
      color: var(--text);
      font-weight: 800;
    }

    .api-status {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--card);
      border: 2px solid var(--border);
      padding: 8px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .api-status .ok { color: var(--success); }
    .api-status .error { color: var(--danger); }

    .buttons {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    button {
      flex: 1;
      background: var(--primary);
      color: #000;
      border: 4px solid var(--primary);
      padding: 14px 20px;
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }

    button:hover:not(:disabled) {
      background: transparent;
      color: var(--primary);
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 var(--primary);
    }

    button:disabled {
      background: var(--surface);
      color: var(--text-muted);
      border-color: var(--border);
      cursor: not-allowed;
    }

    #btn-reload {
      background: #222;
      border-color: #333;
      color: #fff;
    }

    #btn-reload:hover:not(:disabled) {
      background: transparent;
      color: #fff;
      box-shadow: 8px 8px 0 #333;
    }

    #error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      font-weight: 700;
      text-align: center;
      max-width: 100%;
      display: none;
      padding: 12px;
      background: rgba(255, 0, 0, 0.1);
      border: 2px solid var(--danger);
    }

    #qr-placeholder {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="api-status" id="api-status">
    Gateway: <span id="api-state">checking...</span>
  </div>

  <h1>WhatsApp Gateway</h1>
  <p class="subtitle">Conecte seu WhatsApp com QR</p>

  <div class="card">
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Aguardando QR...</span>
    </div>

    <div class="qr-container" id="qr-container">
      <img id="qr-image" src="" alt="QR Code" style="display:none">
      <div id="qr-placeholder">Carregando...</div>
    </div>

    <div id="phone-display" class="phone" style="display:none"></div>

    <div id="error-msg"></div>

    <div class="buttons">
      <button id="btn-refresh" onclick="fetchQR()">
        Atualizar QR
      </button>
      <button id="btn-reload" onclick="location.reload()">
        Recarregar
      </button>
    </div>

    <div class="instructions">
      <strong>COMO CONECTAR:</strong><br>
      1. Abra o WhatsApp no celular<br>
      2. Configurações → Dispositivos vinculados<br>
      3. Toque em "Linkar novo dispositivo"<br>
      4. Escaneie o QR code acima
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';
    let pollInterval = null;

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        document.getElementById('api-state').innerHTML = `<span class="ok">online (${data.state})</span>`;
        return data;
      } catch {
        document.getElementById('api-state').innerHTML = `<span class="error">offline</span>`;
        return null;
      }
    }

    async function fetchQR() {
      const img = document.getElementById('qr-image');
      const placeholder = document.getElementById('qr-placeholder');
      const dot = document.getElementById('dot');
      const statusText = document.getElementById('status-text');
      const phoneDisplay = document.getElementById('phone-display');
      const errorMsg = document.getElementById('error-msg');

      placeholder.textContent = 'Carregando...';
      img.style.display = 'none';
      placeholder.style.display = 'flex';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch(`${API}/api/qr`);
        const data = await res.json();

        if (data.status === 'already_connected') {
          placeholder.style.display = 'none';
          img.style.display = 'none';
          dot.classList.add('connected');
          statusText.textContent = `CONECTADO`;
          phoneDisplay.textContent = data.phone;
          phoneDisplay.style.display = 'block';
          document.getElementById('btn-refresh').disabled = true;
          if (pollInterval) clearInterval(pollInterval);
          return;
        }

        if (data.status === 'no_qr') {
          placeholder.textContent = data.message || 'QR não disponível';
          return;
        }

        placeholder.style.display = 'none';
        img.src = data.qr;
        img.style.display = 'block';
        statusText.textContent = 'QR DISPONÍVEL — 60s';

        const expires = data.expires;
        let remaining = Math.floor((expires - Date.now()) / 1000);
        const countdown = setInterval(() => {
          remaining--;
          if (remaining > 0) {
            statusText.textContent = `QR DISPONÍVEL — ${remaining}s`;
          } else {
            statusText.textContent = 'QR EXPIRADO';
            clearInterval(countdown);
          }
        }, 1000);

        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(fetchQR, 5000);

      } catch (err) {
        placeholder.textContent = 'ERRO DE CONEXÃO';
        placeholder.style.color = var(--danger);
        errorMsg.textContent = `GATEWAY OFFLINE?`;
        errorMsg.style.display = 'block';
      }
    }

    checkHealth();
    fetchQR();
    setInterval(checkHealth, 10000);
  </script>
</body>
</html>
