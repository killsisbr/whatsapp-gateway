<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Gateway — Estatísticas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff3e00;
      --primary-rgb: 255, 62, 0;
      --secondary: #00f2ff;
      --bg: #000000;
      --surface: #0a0a0a;
      --card: #111111;
      --text: #ffffff;
      --text-muted: #888888;
      --border: #1a1a1a;
      --danger: #ff0000;
      --success: #00ff88;
      --warning: #fbbf24;
      --info: #3b82f6;
      --brutal-border: 4px solid var(--border);
      --shadow-hard: 12px 12px 0px var(--border);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(var(--primary-rgb), 0.08) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .back {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--border);
      padding: 0.5rem 1rem;
      transition: all 0.2s;
    }

    .back:hover {
      color: var(--text);
      border-color: var(--text);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--text);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--card);
      border: var(--brutal-border);
      padding: 1.5rem;
      text-align: center;
    }

    .stat-card .val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
    }

    .stat-card .lbl {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }

    .stat-card:nth-child(1) .val { color: var(--info); }
    .stat-card:nth-child(2) .val { color: var(--success); }
    .stat-card:nth-child(3) .val { color: var(--danger); }
    .stat-card:nth-child(4) .val { color: var(--warning); }

    .section {
      background: var(--card);
      border: var(--brutal-border);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      color: var(--text-muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 1rem 0.75rem;
      border-bottom: 2px solid var(--border);
    }

    td {
      padding: 1rem 0.75rem;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .mono {
      font-family: 'Space Grotesk', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    strong {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
    }

    .state-connected { color: var(--success); }
    .state-disconnected { color: var(--text-muted); }
    .state-qr_ready { color: var(--warning); }
    .state-connecting { color: var(--info); }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Estatísticas</h1>
      <a href="/tenants" class="back">← Tenants</a>
    </header>

    <div class="summary" id="summary">
      <div class="stat-card"><div class="val" id="total-sent">-</div><div class="lbl">📤 Enviados</div></div>
      <div class="stat-card"><div class="val" id="total-received">-</div><div class="lbl">📥 Recebidos</div></div>
      <div class="stat-card"><div class="val" id="total-failed">-</div><div class="lbl">✗ Falhas</div></div>
      <div class="stat-card"><div class="val" id="total-qr">-</div><div class="lbl">📷 QR Scans</div></div>
    </div>

    <div class="section">
      <h2>Tenants</h2>
      <div id="tenants-table"></div>
    </div>
  </div>

  <script>
    async function init() {
      const res = await fetch('/api/tenants');
      const tenants = await res.json();

      let totalSent = 0, totalRecv = 0, totalFail = 0, totalQr = 0;

      if (!tenants.length) {
        document.getElementById('tenants-table').innerHTML = '<div class="empty">Nenhum tenant</div>';
        return;
      }

      const rows = await Promise.all(tenants.map(async t => {
        const sr = await fetch(`/api/tenants/${t.id}/stats`);
        const s = await sr.json();
        totalSent += s.messagesSent || 0;
        totalRecv += s.messagesReceived || 0;
        totalFail += s.messagesFailed || 0;
        totalQr += s.qrScans || 0;
        const lastConn = s.lastConnectedAt ? new Date(s.lastConnectedAt).toLocaleString('pt-BR') : '—';
        const lastDisc = s.lastDisconnectedAt ? new Date(s.lastDisconnectedAt).toLocaleString('pt-BR') : '—';
        return `<tr>
          <td><strong>${t.name}</strong><br><span class="mono">${t.id.slice(0,8)}...</span></td>
          <td class="state-${t.state}">${t.state}</td>
          <td>${t.phone || '—'}</td>
          <td>${s.messagesSent}</td>
          <td>${s.messagesReceived}</td>
          <td style="color:${s.messagesFailed>0?'#ff0000':'inherit'}">${s.messagesFailed}</td>
          <td>${s.qrScans}</td>
          <td class="mono">${lastConn}</td>
          <td class="mono">${lastDisc}</td>
        </tr>`;
      }));

      document.getElementById('tenants-table').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Tenant</th><th>Estado</th><th>Telefone</th>
              <th>📤 Env</th><th>📥 Rec</th><th>✗ Falhas</th>
              <th>📷 QR</th><th>Última Conexão</th><th>Última Desconexão</th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>`;

      document.getElementById('total-sent').textContent = totalSent;
      document.getElementById('total-received').textContent = totalRecv;
      document.getElementById('total-failed').textContent = totalFail;
      document.getElementById('total-qr').textContent = totalQr;
    }

    init();
  </script>
</body>
</html>
