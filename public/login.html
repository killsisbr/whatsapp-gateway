<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Gateway — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff3e00;
      --primary-rgb: 255, 62, 0;
      --secondary: #00f2ff;
      --bg: #000000;
      --surface: #0a0a0a;
      --card: #111111;
      --text: #ffffff;
      --text-muted: #888888;
      --border: #1a1a1a;
      --danger: #ff0000;
      --success: #00ff88;
      --brutal-border: 4px solid var(--border);
      --shadow-hard: 12px 12px 0px var(--border);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(var(--primary-rgb), 0.08) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      background: var(--card);
      border: var(--brutal-border);
      box-shadow: var(--shadow-hard);
      padding: 3rem;
      max-width: 420px;
      width: 100%;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 2rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: var(--brutal-border);
    }

    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
      border: none;
    }

    .tab.active {
      background: var(--primary);
      color: #000;
    }

    .tab:hover:not(.active) {
      background: #1a1a1a;
    }

    .form { display: none; }
    .form.active { display: block; }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 1rem;
      background: #000;
      border: 2px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      margin-bottom: 1.25rem;
    }

    input:focus {
      border-color: var(--primary);
    }

    input::placeholder {
      color: #444;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: #000;
      border: 4px solid var(--primary);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }

    .btn:hover:not(:disabled) {
      background: transparent;
      color: var(--primary);
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 var(--primary);
    }

    .btn:disabled {
      background: var(--surface);
      color: var(--text-muted);
      border-color: var(--border);
      cursor: not-allowed;
    }

    .error {
      background: rgba(255, 0, 0, 0.1);
      color: var(--danger);
      padding: 1rem;
      border: 2px solid var(--danger);
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: none;
    }

    .success {
      background: rgba(0, 255, 136, 0.1);
      color: var(--success);
      padding: 1rem;
      border: 2px solid var(--success);
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: none;
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .link:hover {
      text-decoration: underline;
    }

    p.footer-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WhatsApp Gateway</h1>
    <p class="subtitle">Acesso ao sistema</p>

    <div class="tabs">
      <button class="tab active" onclick="showForm('login')">Login</button>
      <button class="tab" onclick="showForm('register')">Criar Conta</button>
    </div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <!-- Login Form -->
    <form class="form active" id="login-form" onsubmit="handleLogin(event)">
      <label>Email</label>
      <input type="email" id="login-email" required placeholder="seu@email.com">
      <label>Senha</label>
      <input type="password" id="login-password" required placeholder="••••••">
      <button type="submit" class="btn">Entrar</button>
    </form>

    <!-- Register Form -->
    <form class="form" id="register-form" onsubmit="handleRegister(event)">
      <label>Nome</label>
      <input type="text" id="register-name" required placeholder="Seu nome">
      <label>Email</label>
      <input type="email" id="register-email" required placeholder="seu@email.com">
      <label>Senha</label>
      <input type="password" id="register-password" required placeholder="••••••" minlength="6">
      <button type="submit" class="btn">Criar Conta</button>
    </form>

    <p class="footer-text">
      Já tem conta? <a href="#" class="link" onclick="showForm('login');return false;">Fazer login</a>
    </p>
  </div>

  <script>
    const API = '/api/auth';

    function showForm(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      if (type === 'login') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('login-form').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('register-form').classList.add('active');
      }
      hideMsg();
    }

    function showMsg(el, msg, isError) {
      el.textContent = msg;
      el.style.display = 'block';
      el.className = isError ? 'error' : 'success';
    }

    function hideMsg() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('error');

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        localStorage.setItem('wha_token', data.token);
        localStorage.setItem('wha_user', JSON.stringify(data.user));
        window.location.href = '/tenants';
      } catch (err) {
        showMsg(errorEl, err.message, true);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');

      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        showMsg(successEl, 'CONTA CRIADA! REDIRECIONANDO...', false);
        localStorage.setItem('wha_token', data.token);
        localStorage.setItem('wha_user', JSON.stringify(data.user));
        setTimeout(() => window.location.href = '/tenants', 1500);
      } catch (err) {
        showMsg(errorEl, err.message, true);
      }
    }

    (function() {
      const token = localStorage.getItem('wha_token');
      if (token) {
        window.location.href = '/tenants';
      }
    })();
  </script>
</body>
</html>
