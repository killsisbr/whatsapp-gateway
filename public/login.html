<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Gateway — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #e0e6ed;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #f9fafb; text-align: center; }
    .subtitle { color: #6b7280; font-size: 0.875rem; text-align: center; margin-bottom: 2rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab {
      flex: 1;
      padding: 0.75rem;
      text-align: center;
      border-radius: 8px;
      background: #1f2937;
      color: #9ca3af;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .tab.active { background: #3b82f6; color: white; }
    .form { display: none; }
    .form.active { display: block; }
    label { display: block; margin-bottom: 0.5rem; color: #9ca3af; font-size: 0.875rem; }
    input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #e0e6ed;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    .btn {
      width: 100%;
      padding: 0.875rem;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .error { background: #7f1d1d; color: #fca5a5; padding: 0.75rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .success { background: #064e3b; color: #34d399; padding: 0.75rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; display: none; }
    .link { color: #3b82f6; text-decoration: none; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 WhatsApp Gateway</h1>
    <p class="subtitle">Acesse sua conta</p>

    <div class="tabs">
      <div class="tab active" onclick="showForm('login')">Login</div>
      <div class="tab" onclick="showForm('register')">Criar conta</div>
    </div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <!-- Login Form -->
    <form class="form active" id="login-form" onsubmit="handleLogin(event)">
      <label>Email</label>
      <input type="email" id="login-email" required placeholder="seu@email.com">
      <label>Senha</label>
      <input type="password" id="login-password" required placeholder="••••••">
      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <!-- Register Form -->
    <form class="form" id="register-form" onsubmit="handleRegister(event)">
      <label>Nome</label>
      <input type="text" id="register-name" required placeholder="Seu nome">
      <label>Email</label>
      <input type="email" id="register-email" required placeholder="seu@email.com">
      <label>Senha</label>
      <input type="password" id="register-password" required placeholder="••••••" minlength="6">
      <button type="submit" class="btn btn-primary">Criar conta</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:#6b7280;">
      Já tem conta? <a href="#" class="link" onclick="showForm('login');return false;">Fazer login</a>
    </p>
  </div>

  <script>
    const API = '/api/auth';

    function showForm(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      if (type === 'login') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('login-form').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('register-form').classList.add('active');
      }
      hideMsg();
    }

    function showMsg(el, msg, isError) {
      el.textContent = msg;
      el.style.display = 'block';
      el.className = isError ? 'error' : 'success';
    }

    function hideMsg() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('error');

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        localStorage.setItem('wha_token', data.token);
        localStorage.setItem('wha_user', JSON.stringify(data.user));
        window.location.href = '/tenants';
      } catch (err) {
        showMsg(errorEl, err.message, true);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');

      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        showMsg(successEl, 'Conta criada! Redirecionando...', false);
        localStorage.setItem('wha_token', data.token);
        localStorage.setItem('wha_user', JSON.stringify(data.user));
        setTimeout(() => window.location.href = '/tenants', 1500);
      } catch (err) {
        showMsg(errorEl, err.message, true);
      }
    }

    // Check if already logged in
    (function() {
      const token = localStorage.getItem('wha_token');
      if (token) {
        window.location.href = '/tenants';
      }
    })();
  </script>
</body>
</html>
