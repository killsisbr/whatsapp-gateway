<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Gateway — Scan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #e0e6ed;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f9fafb; }
    .subtitle { color: #6b7280; font-size: 0.875rem; margin-bottom: 2rem; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-disconnected { background: #1f2937; color: #9ca3af; }
    .status-connecting { background: #1e3a5f; color: #60a5fa; }
    .status-qr_ready { background: #3b2f0a; color: #fbbf24; }
    .status-connected { background: #064e3b; color: #34d399; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #qr-container {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      display: inline-block;
      margin: 1rem 0;
      position: relative;
    }
    #qr-img { display: block; max-width: 250px; width: 100%; }
    #qr-placeholder { color: #6b7280; font-size: 0.875rem; padding: 3rem 2rem; }
    .phone { color: #34d399; font-size: 1.1rem; font-weight: 700; margin: 1rem 0; }
    .timer { color: #6b7280; font-size: 0.75rem; margin-top: 1rem; }
    .instructions {
      background: #1f2937;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1.5rem;
      text-align: left;
      font-size: 0.8rem;
      color: #9ca3af;
      line-height: 1.6;
    }
    .instructions strong { color: #e5e7eb; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: #1f2937;
      color: #e0e6ed;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.875rem;
      border: 1px solid #374151;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #374151; }
    .tenant-info { font-size: 0.75rem; color: #6b7280; margin-bottom: 1.5rem; }
    .error { background: #7f1d1d; color: #fca5a5; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 WhatsApp Gateway</h1>
    <p class="subtitle">Escaneie o QR Code para conectar</p>

    <div class="tenant-info" id="tenant-info">Tenant: ...</div>

    <div id="status-badge" class="status-badge status-disconnected">
      <span class="dot"></span>
      <span id="status-text">Iniciando...</span>
    </div>

    <div id="qr-container">
      <div id="qr-placeholder">Aguardando QR Code...</div>
      <img id="qr-img" style="display:none" alt="QR Code" />
    </div>

    <div id="phone-display" class="phone" style="display:none"></div>
    <div id="timer" class="timer"></div>

    <div id="instructions" class="instructions" style="display:none">
      <strong>Como escanear:</strong><br>
      1. Abra o WhatsApp no seu celular<br>
      2. Toque em ⋮ &rarr; <strong>Aparelhos conectados</strong><br>
      3. Toque em <strong>Conectar um aparelho</strong><br>
      4. Aponte a câmera para o QR Code
    </div>

    <a href="/tenants" class="btn">← Voltar</a>
  </div>

  <script>
    const tenantId = window.location.pathname.split('/')[2];
    document.getElementById('tenant-info').textContent = 'Tenant: ' + tenantId;

    let qrInterval;
    let countdown = 5;
    let connected = false;

    function updateStatus(state, phone) {
      const badge = document.getElementById('status-badge');
      const text = document.getElementById('status-text');
      const instructions = document.getElementById('instructions');
      const phoneDisplay = document.getElementById('phone-display');
      const placeholder = document.getElementById('qr-placeholder');

      badge.className = 'status-badge status-' + state;

      if (state === 'connected') {
        text.textContent = '✅ Conectado';
        phoneDisplay.textContent = phone || '';
        phoneDisplay.style.display = 'block';
        placeholder.style.display = 'none';
        document.getElementById('qr-img').style.display = 'none';
        clearInterval(qrInterval);
        connected = true;
        instructions.innerHTML = '<strong>✅ WhatsApp conectado com sucesso!</strong><br>Agora você pode usar este tenant para enviar e receber mensagens via API.';
      } else if (state === 'qr_ready') {
        text.innerHTML = '<span class="pulse">●</span> QR Available';
        instructions.style.display = 'block';
        placeholder.style.display = 'none';
      } else if (state === 'connecting') {
        text.innerHTML = '<span class="pulse">●</span> Conectando...';
      } else if (state === 'disconnected') {
        text.textContent = 'Desconectado';
      } else {
        text.textContent = state || '...';
      }
    }

    function updateTimer() {
      if (connected) return;
      countdown--;
      if (countdown <= 0) countdown = 5;
      document.getElementById('timer').textContent = `Próxima atualização em ${countdown}s`;
    }

    async function pollQR() {
      try {
        const [statusRes, qrRes] = await Promise.all([
          fetch(`/api/tenants/${tenantId}/status`),
          fetch(`/api/tenants/${tenantId}/qr`)
        ]);

        const status = await statusRes.json();
        updateStatus(status.state, status.phone);

        if (status.state === 'qr_ready' || status.state === 'connecting') {
          if (qrRes.ok) {
            const qr = await qrRes.json();
            if (qr.qr) {
              const img = document.getElementById('qr-img');
              img.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qr.qr)}`;
              img.style.display = 'block';
              document.getElementById('qr-placeholder').style.display = 'none';
            }
          }
        }
      } catch (e) {
        document.getElementById('timer').textContent = 'Erro ao buscar dados';
      }
    }

    // Start polling
    pollQR();
    qrInterval = setInterval(pollQR, 5000);
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
