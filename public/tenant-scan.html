<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Gateway — Scan QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff3e00;
      --primary-rgb: 255, 62, 0;
      --secondary: #00f2ff;
      --bg: #000000;
      --surface: #0a0a0a;
      --card: #111111;
      --text: #ffffff;
      --text-muted: #888888;
      --border: #1a1a1a;
      --danger: #ff0000;
      --success: #00ff88;
      --warning: #fbbf24;
      --brutal-border: 4px solid var(--border);
      --shadow-hard: 12px 12px 0px var(--border);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(var(--primary-rgb), 0.08) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      background: var(--card);
      border: var(--brutal-border);
      box-shadow: var(--shadow-hard);
      padding: 3rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      background: #0a0a0a;
      border: 2px solid var(--border);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }

    .status-disconnected { color: var(--text-muted); }
    .status-connecting { color: #3b82f6; }
    .status-qr_ready { color: var(--warning); }
    .status-connected { color: var(--success); }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 0;
      background: currentColor;
    }

    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #qr-container {
      background: #fff;
      padding: 1rem;
      display: inline-block;
      margin: 1rem 0;
    }

    #qr-img {
      display: block;
      max-width: 280px;
      width: 100%;
    }

    #qr-placeholder {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3rem 2rem;
    }

    .phone {
      color: var(--success);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Space Grotesk', monospace;
      margin: 1rem 0;
    }

    .timer {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 1rem;
    }

    .instructions {
      background: #0a0a0a;
      border: 2px solid var(--border);
      padding: 1.25rem;
      margin-top: 1.5rem;
      text-align: left;
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.8;
      font-weight: 600;
    }

    .instructions strong {
      color: var(--text);
      font-weight: 800;
      display: block;
      margin-bottom: 0.5rem;
    }

    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.875rem 2rem;
      background: #222;
      color: var(--text);
      border: 2px solid #333;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }

    .btn:hover {
      background: transparent;
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 #333;
    }

    .tenant-info {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .error {
      background: rgba(255, 0, 0, 0.1);
      color: var(--danger);
      padding: 1rem;
      border: 2px solid var(--danger);
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WhatsApp Gateway</h1>
    <p class="subtitle">Escaneie o QR Code</p>

    <div class="tenant-info" id="tenant-info">Tenant: ...</div>

    <div id="status-badge" class="status-badge status-disconnected">
      <span class="dot"></span>
      <span id="status-text">Iniciando...</span>
    </div>

    <div id="qr-container">
      <div id="qr-placeholder">Aguardando QR...</div>
      <img id="qr-img" style="display:none" alt="QR Code" />
    </div>

    <div id="phone-display" class="phone" style="display:none"></div>
    <div id="timer" class="timer"></div>

    <div id="instructions" class="instructions" style="display:none">
      <strong>COMO ESCANEAR:</strong>
      1. Abra o WhatsApp no celular<br>
      2. Toque em ⋮ → <strong>Aparelhos conectados</strong><br>
      3. Toque em <strong>Conectar um aparelho</strong><br>
      4. Aponte a câmera para o QR Code
    </div>

    <a href="/tenants" class="btn">← Voltar</a>
  </div>

  <script>
    (function() {
      const token = localStorage.getItem('wha_token');
      if (!token) {
        window.location.href = '/login';
        return;
      }
    })();

    const tenantId = window.location.pathname.split('/')[2];
    document.getElementById('tenant-info').textContent = 'Tenant: ' + tenantId;

    let qrInterval;
    let countdown = 5;
    let connected = false;

    function updateStatus(state, phone) {
      const badge = document.getElementById('status-badge');
      const text = document.getElementById('status-text');
      const instructions = document.getElementById('instructions');
      const phoneDisplay = document.getElementById('phone-display');
      const placeholder = document.getElementById('qr-placeholder');

      badge.className = 'status-badge status-' + state;

      if (state === 'connected') {
        text.textContent = 'CONECTADO';
        phoneDisplay.textContent = phone || '';
        phoneDisplay.style.display = 'block';
        placeholder.style.display = 'none';
        document.getElementById('qr-img').style.display = 'none';
        clearInterval(qrInterval);
        connected = true;
        instructions.innerHTML = '<strong>✅ WHATSAPP CONECTADO!</strong>Agora você pode usar este tenant para enviar e receber mensagens via API.';
      } else if (state === 'qr_ready') {
        text.innerHTML = '<span class="pulse">●</span> QR DISPONÍVEL';
        instructions.style.display = 'block';
        placeholder.style.display = 'none';
      } else if (state === 'connecting') {
        text.innerHTML = '<span class="pulse">●</span> CONECTANDO...';
      } else if (state === 'disconnected') {
        text.textContent = 'DESCONECTADO';
      } else {
        text.textContent = state || '...';
      }
    }

    function updateTimer() {
      if (connected) return;
      countdown--;
      if (countdown <= 0) countdown = 5;
      document.getElementById('timer').textContent = `Próxima atualização em ${countdown}s`;
    }

    async function pollQR() {
      const token = localStorage.getItem('wha_token');
      try {
        const [statusRes, qrRes] = await Promise.all([
          fetch(`/api/tenants/${tenantId}/status`, {
            headers: { 'Authorization': `Bearer ${token}` }
          }),
          fetch(`/api/tenants/${tenantId}/qr`, {
            headers: { 'Authorization': `Bearer ${token}` }
          })
        ]);

        const status = await statusRes.json();
        updateStatus(status.state, status.phone);

        if (status.state === 'qr_ready' || status.state === 'connecting') {
          if (qrRes.ok) {
            const qr = await qrRes.json();
            if (qr.qr) {
              const img = document.getElementById('qr-img');
              img.src = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(qr.qr)}`;
              img.style.display = 'block';
              document.getElementById('qr-placeholder').style.display = 'none';
            }
          }
        }
      } catch (e) {
        document.getElementById('timer').textContent = 'Erro ao buscar dados';
      }
    }

    pollQR();
    qrInterval = setInterval(pollQR, 5000);
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
