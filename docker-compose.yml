services:
  whatsapp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-whatsapp-gateway-secret-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - gateway-data:/app/data
      - gateway-session:/app/session
      - gateway-logs:/app/logs
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: whatsapp-gateway-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - gateway-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gateway-data:
    driver: local
  gateway-session:
    driver: local
  gateway-logs:
    driver: local
  redis-data:
    driver: local

networks:
  gateway-network:
    driver: bridge
